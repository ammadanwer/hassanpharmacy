<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hassan Pharmacy</title>
    <link rel="stylesheet" href="/static/styles.css?v=20260701-hassan-pharmacy" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span class="brand-dot"></span>
            <span class="brand-plus"></span>
            <span class="brand-e">H</span>
          </div>
          <div class="brand-copy">
            <strong>Hassan</strong>
            <small>Pharmacy</small>
          </div>
        </div>
        <nav id="nav"></nav>
        <div class="session-box">
          <div id="sessionName">Not signed in</div>
          <button id="logoutBtn" class="ghost small" type="button">Sign out</button>
        </div>
      </aside>

      <main>
        <header class="topbar">
          <div class="header-left">
            <button class="menu-toggle secondary" type="button">☰</button>
            <button id="quickSaleBtn" type="button">Add New Sale</button>
          </div>
          <div class="header-right">
            <span class="renew-badge">HP</span>
            <span>Hassan Pharmacy</span>
            <button class="kebab secondary" type="button">⋮</button>
          </div>
          <div class="page-title-row">
            <h1 id="viewTitle">Dashboard</h1>
            <p id="viewSubtitle">Hassan Pharmacy</p>
            <button id="refreshBtn" class="secondary small" type="button">Refresh</button>
          </div>
        </header>

        <section id="authPanel" class="auth-panel">
          <div>
            <h2>Sign in</h2>
            <p>Use an existing staff account, or create the first owner account.</p>
          </div>
          <form id="loginForm" class="inline-form">
            <input name="username" type="email" placeholder="Email" autocomplete="username" required />
            <input name="password" type="password" placeholder="Password" autocomplete="current-password" required />
            <button type="submit">Sign in</button>
          </form>
          <form id="registerForm" class="inline-form">
            <input name="name" placeholder="Name" autocomplete="name" required />
            <input name="email" type="email" placeholder="Email" autocomplete="email" required />
            <input name="password" type="password" placeholder="Password" autocomplete="new-password" required />
            <select name="role">
              <option value="owner">Owner</option>
              <option value="admin">Admin</option>
              <option value="manager">Manager</option>
              <option value="pharmacist">Pharmacist</option>
              <option value="stock_manager">Stock manager</option>
              <option value="technician">Technician</option>
            </select>
            <button type="submit">Create account</button>
          </form>
        </section>

        <div id="notice" class="notice" hidden></div>
        <section id="content"></section>
      </main>
    </div>

    <script src="/static/app.js?v=20260701-hassan-pharmacy" defer></script>
  </body>
</html>
